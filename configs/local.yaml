listen_addr: ":8008"
metrics_addr: ":9090"
mode: http
balancer: round_robin
max_connections: 10000

backends:
  - "localhost:9001"
  - "localhost:9002"
  - "localhost:9003"

timeouts:
  dial:  10s
  read:  20s
  write: 30s
  idle:  50s

health:
  interval: 5s
  timeout:  2s
  path:     "/"
  failure_threshold: 2
  success_threshold: 1

log:
  level:  info
  format: text

retries:
  max_attempts: 3
  retry_on_5xx: false
  total_timeout: 10s

circuit_breaker:
  enabled:           false
  failure_threshold: 5
  success_threshold: 2
  timeout:           30s

sticky_session:
  enabled:     true
  cookie_name: GOBALANCER_BACKEND

rate_limit:
  enabled:             false
  requests_per_second: 100
  burst:               200