listen_addr: ":8008"
mode: http
balancer: round_robin

backends:
  - "localhost:9001"
  - "localhost:9002"
  - "localhost:9003"

timeouts:
  dial:  5s
  read:  30s
  write: 30s
  idle:  90s

health:
  interval: 10s
  timeout:  2s
  path:     "/health"
  failure_threshold: 2
  success_threshold: 1

log:
  level:  info
  format: text

retries:
  max_attempts: 3
  retry_on_5xx: false
  total_timeout: 15s